<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purrfect Paws 관리자</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/admin.css" />
  </head>
  <body class="admin-body">
    <div class="admin-container">
      <header class="admin-header">
        <h1>문의 관리 대시보드</h1>
        <div class="admin-meta">
          <span class="admin-user" data-admin-user>관리자</span>
          <button class="ghost" id="logout-btn">로그아웃</button>
        </div>
      </header>

      <section class="admin-login" data-view="login">
        <h2>관리자 로그인</h2>
        <form id="login-form" class="admin-form">
          <label>
            아이디
            <input type="text" name="username" required placeholder="admin" />
          </label>
          <label>
            비밀번호
            <input type="password" name="password" required placeholder="••••" />
          </label>
          <button type="submit" class="primary">로그인</button>
          <p class="form-feedback" role="status"></p>
        </form>
      </section>

      <section class="admin-dashboard" data-view="dashboard" hidden>
        <div class="dashboard-top">
          <h2>문의 목록</h2>
          <p>새로운 문의가 접수되면 리스트가 자동으로 업데이트됩니다.</p>
        </div>
        <div class="inquiry-table-wrapper">
          <table class="inquiry-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>이름</th>
                <th>전화번호</th>
                <th>문의 내용</th>
                <th>상태</th>
                <th>관리 메모</th>
                <th>등록일</th>
                <th>업데이트</th>
              </tr>
            </thead>
            <tbody data-inquiry-list></tbody>
          </table>
        </div>
      </section>
    </div>

    <script src="/js/admin.js" type="module"></script>
  </body>
</html>
